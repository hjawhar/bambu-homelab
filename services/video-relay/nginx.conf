server {
    listen 80;

    location /streams/ {
        alias /usr/share/nginx/html/streams/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    location /timelapses/ {
        alias /usr/share/nginx/html/timelapses/;
        add_header Access-Control-Allow-Origin *;
    }
}
