# NATS server configuration for local development.
# This is a template — run scripts/setup-dev.sh to resolve placeholders.

listen: 0.0.0.0:4222

server_name: bambu-dev

tls {
  cert_file: "/etc/nats/certs/server.pem"
  key_file: "/etc/nats/certs/server.key"
  ca_file: "/etc/nats/certs/ca.pem"
}

jetstream {
  store_dir: "/data"
  max_mem: 128MB
  max_file: 1GB
}

authorization {
  users = [
    {
      nkey: "PLACEHOLDER_GATEWAY_PUBKEY"
      permissions: {
        publish: {
          allow: ["printers.>", "bridge.>", "$JS.API.>", "$JS.ACK.>"]
        }
        subscribe: {
          allow: ["printers.>", "bridge.>", "_INBOX.>"]
        }
      }
    }
    {
      nkey: "PLACEHOLDER_PRINTER_PUBKEY"
      permissions: {
        publish: {
          allow: ["printers.>", "bridge.>", "$JS.API.>", "_INBOX.>"]
        }
        subscribe: {
          allow: ["printers.*.cmd", "bridge.>", "_INBOX.>"]

        }
      }
    }
  ]
}

debug: false
trace: false
logtime: true
